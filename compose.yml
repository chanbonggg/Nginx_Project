services:
  postgres:
    image: postgres:16
    container_name: week02-postgres
    environment:
      POSTGRES_USER: chan
      POSTGRES_PASSWORD: chan1234
      POSTGRES_DB: appdb
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: week02-redis
    ports:
      - "6379:6379"

  adminer:
    image: adminer
    container_name: week02-adminer
    ports:
      - "8081:8080"
    depends_on:
      - postgres
  
  backend:
    build:
      context: ./spring-backend
    container_name: spring-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/appdb
      SPRING_DATASOURCE_USERNAME: chan
      SPRING_DATASOURCE_PASSWORD: chan1234
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    depends_on:
      - postgres
      - redis

  nginx:
    image: nginx
    container_name: week02-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

  frontend:
    build: ./frontend
    container_name: week02-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev

volumes:
  postgres-data:
